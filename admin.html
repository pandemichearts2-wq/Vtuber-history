<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Graduate History 管理</title><link rel="stylesheet" href="styles.css?v=20260722-fa-cycle1"></head><body class="admin-page">
<header class="admin-header"><div class="wrap"><p class="eyebrow">Private Management</p><h1>Graduate History<br>Management</h1></div></header>
<main class="admin-main">
<section id="adminLogin" class="admin-login"><div class="admin-login-card"><p class="eyebrow">Administrator Login</p><h2>管理画面へログイン</h2><p>スプレッドシートで設定した管理パスワードを入力してください。</p><form id="adminLoginForm"><label for="adminPassword">管理パスワード</label><input id="adminPassword" type="password" autocomplete="current-password" required><button class="admin-button gold" type="submit" style="margin-top:18px;width:100%">ログイン</button><p id="adminLoginMessage" class="admin-message" role="status"></p></form></div></section>
<section id="adminShell" class="admin-shell" hidden>
<div class="admin-topbar"><div><p class="eyebrow">Administration</p><h2 style="margin:4px 0 0">管理メニュー</h2></div><div><span class="admin-user-state">管理者としてログイン中</span> <button id="adminLogout" class="admin-button secondary" type="button">ログアウト</button></div></div>
<nav class="admin-tabs" aria-label="管理項目"><button class="admin-tab active" data-admin-tab="submissions" type="button"><span>申請管理</span><span id="submissionNotificationBadge" class="admin-notification-badge admin-notification-badge-submission" aria-label="確認待ちの申請件数" hidden>0</span></button><button class="admin-tab" data-admin-tab="feedback" type="button"><span>お問い合わせ管理</span><span class="admin-notification-group" aria-label="お問い合わせ件数"><span id="feedbackUnconfirmedBadge" class="admin-notification-badge admin-notification-badge-unconfirmed" aria-label="未確認のお問い合わせ件数" title="未確認" hidden><span class="admin-notification-mark" aria-hidden="true">未</span><span data-badge-count>0</span></span><span id="feedbackInProgressBadge" class="admin-notification-badge admin-notification-badge-progress" aria-label="対応中のお問い合わせ件数" title="対応中" hidden><span class="admin-notification-mark" aria-hidden="true">中</span><span data-badge-count>0</span></span></span></button><button class="admin-tab" data-admin-tab="content" type="button"><span>登録内容管理</span></button><button id="adminPageRefresh" class="admin-button secondary admin-page-refresh" type="button" aria-label="管理画面を更新">更新</button></nav>
<section id="adminPanelSubmissions" class="admin-panel">
<div class="admin-toolbar"><input id="submissionQuery" type="search" placeholder="活動名・申請IDで検索"><select id="submissionType"><option value="">すべての申請</option><option value="add">追記</option><option value="fix">修正</option><option value="new">新規登録</option><option value="video">動画</option><option value="fanartGeneral">通常FA</option><option value="fanartAdult">成人向けFA</option></select><select id="submissionStatus"><option value="確認待ち">確認待ち</option><option value="">すべての状態</option><option value="許可（掲載）">許可（掲載）</option><option value="非許可（掲載不可）">非許可（掲載不可）</option></select><button id="submissionSearch" class="admin-button" type="button">検索</button><button id="repairPublished" class="admin-button secondary" type="button">許可済みを再反映</button></div>
<div class="admin-bulk-toolbar" aria-label="申請の一括操作">
  <div class="admin-bulk-selection">
    <button id="submissionSelectAll" class="admin-button secondary" type="button">一括チェック</button>
    <button id="submissionClearAll" class="admin-button secondary" type="button">一括チェック解除</button>
    <span id="submissionSelectedCount" class="admin-bulk-count" aria-live="polite">0件選択</span>
  </div>
  <div class="admin-bulk-actions">
    <button id="submissionBulkApprove" class="admin-button gold" type="button" disabled>選択した申請を一括承認</button>
    <button id="submissionBulkDelete" class="admin-button danger" type="button" disabled>選択した申請を一括削除</button>
  </div>
</div>
<div id="submissionList" class="admin-list"></div><button id="submissionMore" class="admin-button secondary admin-load-more" type="button" hidden>さらに表示</button></section>
<section id="adminPanelFeedback" class="admin-panel" hidden><div class="admin-toolbar"><input id="feedbackAdminQuery" type="search" placeholder="内容・VTuber名で検索"><select id="feedbackAdminStatus"><option value="未確認">未確認</option><option value="">すべての状態</option><option value="対応中">対応中</option><option value="対応済み">対応済み</option><option value="対応不要">対応不要</option></select><span></span><button id="feedbackAdminSearch" class="admin-button" type="button">検索</button></div><div id="feedbackAdminList" class="admin-list"></div><button id="feedbackAdminMore" class="admin-button secondary admin-load-more" type="button" hidden>さらに表示</button></section>
<section id="adminPanelContent" class="admin-panel" hidden><div class="admin-toolbar content-toolbar"><select id="contentType"><option value="profiles">VTuberプロフィール</option><option value="videos">動画</option><option value="fanartGeneral">通常FA</option><option value="fanartAdult">成人向けFA</option><option value="letters">思い出メッセージ</option></select><input id="contentQuery" type="search" placeholder="名前・タイトルなどで検索"><button id="contentSearch" class="admin-button" type="button">検索</button></div><div id="contentList" class="admin-list"></div><button id="contentMore" class="admin-button secondary admin-load-more" type="button" hidden>さらに表示</button></section>
</section></main>
<div id="adminEditDialog" class="admin-edit-dialog" role="dialog" aria-modal="true" aria-labelledby="adminEditTitle" hidden><button class="admin-edit-backdrop" data-admin-edit-close type="button" aria-label="閉じる"></button><form id="adminEditForm" class="admin-edit-panel"><button class="admin-edit-close" data-admin-edit-close type="button" aria-label="閉じる">×</button><p class="eyebrow">Edit Content</p><h2 id="adminEditTitle">登録内容を編集</h2><div id="adminEditFields" class="admin-edit-fields"></div><p id="adminEditMessage" class="admin-message" role="status"></p><div class="admin-edit-footer"><button class="admin-button secondary" data-admin-edit-close type="button">キャンセル</button><button id="adminEditSave" class="admin-button gold" type="submit">保存する</button></div></form></div>
<script src="config.js"></script><script src="admin.js?v=20260722-fa-cycle1"></script></body></html>
